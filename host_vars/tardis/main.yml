network_vlans_enabled: true

# Override IP range prefixes to avoid clashes across docker hosts
network_lan_ip_range_prefix: 27    # 192.168.11.0/27 = 192.168.11.0 - 192.168.11.31
network_iot_ip_range_prefix: 27    # 10.0.1.0/27 = 10.0.1.0 - 10.0.1.31

desktop_apps_apt:
  - ark
  - kalk
  - code
  - cups
  - printer-driver-cups-pdf
  - okular
  - vlc
  - calibre
  - inkscape

desktop_apps_flatpak:
  - org.blender.Blender
  - com.spotify.Client
