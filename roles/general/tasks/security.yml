- name: Install UFW firewall
  ansible.builtin.apt:
    name: ufw
    state: present

- name: Open ports
  ansible.builtin.ufw:
    rule: allow
    port: "{{ item }}"
  loop: "{{ general_open_ports }}"

- name: Enable UFW
  ansible.builtin.ufw:
    state: enabled

- name: Install sudo
  ansible.builtin.apt:
    name: sudo
    state: present

- name: Ensure sudoers users exist
  ansible.builtin.user:
    name: "{{ item }}"
    state: present
  loop: "{{ general_sudoers }}"
  when: general_sudoers | length > 0

- name: Configure sudoers
  ansible.builtin.copy:
    dest: "/etc/sudoers.d/{{ item }}"
    content: "{{ item }} ALL=(ALL) ALL"
    mode: "0440"
    validate: "/usr/sbin/visudo -cf %s"
  loop: "{{ general_sudoers }}"
  when: general_sudoers | length > 0
