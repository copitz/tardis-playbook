# --- Verify network connectivity (ping gateway) ---
- name: Refresh network facts if config changed
  ansible.builtin.setup:
    gather_subset:
      - network

- name: Assert LAN is the default route
  ansible.builtin.assert:
    that: ansible_facts['default_ipv4'].interface == 'br-lan'
    success_msg: "LAN is the default route"
    fail_msg: "LAN is not the default route, current default route is via {{ ansible_facts['default_ipv4'].interface }}"

- name: Verify LAN connectivity
  vars:
    test_target: "{{ ansible_facts['default_ipv4'].gateway }}"
  ansible.builtin.command:
    cmd: "ping -I br-lan -c 2 -W 2 {{ test_target }}"
  register: ping_result
  changed_when: false
  failed_when: ping_result.rc != 0
  retries: 3
  delay: 2
  until: ping_result.rc == 0