---
- import_tasks: ifupdown.yml
- import_tasks: networkd.yml
- import_tasks: nm.yml
- import_tasks: verify.yml

# --- Docker networks ---

- name: "Ensure Docker bridge networks exist and match expected config"
  include_tasks: docker-network.yml
  loop:
    - name: "{{ network_lan_name }}"
      parent: "{{ network_lan_parent }}"
      vlan_id: "{{ network_lan_vlan_id }}"
      subnet: "{{ network_lan_subnet }}"
      gateway: "{{ network_lan_gateway }}"
      driver: "{{ network_lan_driver }}"
      ip_range_prefix: "{{ network_lan_ip_range_prefix }}"
    - name: "{{ network_srv_name }}"
      parent: "{{ network_srv_parent }}"
      vlan_id: "{{ network_srv_vlan_id }}"
      subnet: "{{ network_srv_subnet }}"
      gateway: "{{ network_srv_gateway }}"
      driver: "{{ network_srv_driver }}"
      ip_range_prefix: "{{ network_srv_ip_range_prefix }}"
    - name: "{{ network_iot_name }}"
      parent: "{{ network_iot_parent }}"
      vlan_id: "{{ network_iot_vlan_id }}"
      subnet: "{{ network_iot_subnet }}"
      gateway: "{{ network_iot_gateway }}"
      driver: "{{ network_iot_driver }}"
      ip_range_prefix: "{{ network_iot_ip_range_prefix }}"
  vars:
    network_name: "{{ item.name }}"
    parent: "{{ item.parent }}"
    subnet: "{{ item.subnet }}"
    gateway: "{{ item.gateway }}"
    driver: "{{ item.driver }}"
    ip_range_prefix: "{{ item.ip_range_prefix }}"
    ip_range: "{{ item.subnet.split('/')[0] }}/{{ item.ip_range_prefix }}"
  when: network_vlans_enabled
