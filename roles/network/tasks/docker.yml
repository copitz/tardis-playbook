# Create a docker network if it doesn't exist or assert it has the correct config

- name: "docker/{{ network }}: Inspect network"
  ansible.builtin.command: "docker network inspect {{ network }}"
  register: docker_net_inspect_raw
  failed_when: false
  changed_when: false

- name: "docker/{{ network }}: Set fact whether network exists"
  set_fact:
    docker_net_exists: "{{ docker_net_inspect_raw.rc == 0 }}"

- name: "docker/{{ network }}: Parse existing network"
  set_fact:
    docker_net_inspect: "{{ docker_net_inspect_raw.stdout | from_json }}"
  when: docker_net_exists

- name: "docker/{{ network }}: Assert subnet matches expected"
  vars:
    existing: "{{ docker_net_inspect[0].IPAM.Config[0].Subnet }}"
  assert:
    that:
      - existing == subnet
    fail_msg: >
      Docker network {{ network }} exists but subnet is {{ existing }},
      expected {{ subnet }}.
    success_msg: All ok
  when: docker_net_exists

- name: "docker/{{ network }}: Assert gateway matches expected"
  vars:
    existing: "{{ docker_net_inspect[0].IPAM.Config[0].Gateway }}"
  assert:
    that:
      - existing == gateway
    fail_msg: >
      Docker network {{ network }} exists but gateway is {{ existing }},
      expected {{ gateway }}.
    success_msg: All ok
  when: docker_net_exists

- name: "docker/{{ network }}: Create docker network"
  command: >
    docker network create -d {{ driver | default('ipvlan') }}
    --subnet={{ subnet }}
    --gateway={{ gateway }}
    -o parent={{ parent }}
    {{ network }}
  when: not docker_net_exists

