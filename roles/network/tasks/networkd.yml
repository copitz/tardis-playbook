# ----------------------------------------------------------------------
# SYSTEMD-NETWORKD FILE DEFINITIONS
# ----------------------------------------------------------------------

- name: Define desired systemd-networkd config files
  set_fact:
    networkd_files: |-
      {% if network_vlans_enabled %}
      - name: "10-{{ network_lan_iface }}.network"
        content: |
          [Match]
          Name={{ network_lan_iface }}

          [Network]
          Bridge=br-lan
          {% for vlan_id in [network_srv_vlan_id, network_iot_vlan_id] | select %}VLAN=vlan{{ vlan_id }}
          {% endfor %}

      - name: "20-br-lan.netdev"
        content: |
          [NetDev]
          Name=br-lan
          Kind=bridge

      - name: "20-br-lan.network"
        content: |
          [Match]
          Name=br-lan

          [Network]
          DHCP=yes
          IPv6AcceptRA=yes

          [Link]
          RequiredForOnline=routable
      {% else %}
      - name: "10-ethernet.network"
        content: |
          [Match]
          Name=en*

          [Network]
          DHCP=yes
          IPv6AcceptRA=no
          LinkLocalAddressing=no
          IPv6Init=no
          RouteMetric=100

      - name: "20-wifi.network"
        content: |
          [Match]
          Name=wl*

          [Network]
          DHCP=yes
          IPv6AcceptRA=no
          LinkLocalAddressing=no
          IPv6Init=no
          RouteMetric=200
          {% if network_wifi_ssid | default('') | length > 0 %}
          [Wireless]
          SSID={{ network_wifi_ssid }}
          PSK={{ network_wifi_psk }}
          {% endif %}

      - name: "90-default.network"
        content: |
          [Match]
          Name=*

          [Network]
          DHCP=yes
          IPv6AcceptRA=no
          LinkLocalAddressing=no
          IPv6Init=no
          RouteMetric=300
      {% endif %}

- name: Add VLAN networkd file definitions
  when: network_vlans_enabled
  vars:
    vlan_files: |
      {% set vlans = [
        {'key': 'srv', 'vlan_id': network_srv_vlan_id, 'parent': network_srv_parent},
        {'key': 'iot', 'vlan_id': network_iot_vlan_id, 'parent': network_iot_parent}
      ] | selectattr('vlan_id') | list %}
      {% for item in vlans %}
      - name: "30-vlan-{{ item.key }}.netdev"
        content: |
          [NetDev]
          Name=vlan{{ item.vlan_id }}
          Kind=vlan

          [VLAN]
          Id={{ item.vlan_id }}
      - name: "30-vlan-{{ item.key }}.network"
        content: |
          [Match]
          Name=vlan{{ item.vlan_id }}

          [Network]
          Bridge={{ item.parent }}
      - name: "40-{{ item.parent }}.netdev"
        content: |
          [NetDev]
          Name={{ item.parent }}
          Kind=bridge
      - name: "40-{{ item.parent }}.network"
        content: |
          [Match]
          Name={{ item.parent }}

          [Network]
          # No IP for host on bridge, only for containers.
          # This forces host to route all traffic to containers via the LAN gateway,
          # which is what we want, so that host is just another client on the LAN
      {% endfor %}
  set_fact:
    networkd_files: "{{ (networkd_files | from_yaml) + (vlan_files | from_yaml) }}"

- name: Show networkd_files
  debug:
    var: networkd_files

# ----------------------------------------------------------------------
# DEPLOY THE FILES
# ----------------------------------------------------------------------

- name: Deploy systemd-networkd configuration files
  copy:
    dest: "/etc/systemd/network/{{ item.name }}"
    content: "{{ item.content }}"
    mode: "0644"
  loop: "{{ networkd_files }}"
  loop_control:
    label: "{{ item.name }}"
  register: written_networkd_files

# ----------------------------------------------------------------------
# REMOVE ANY OTHER NETWORKD FILES
# ----------------------------------------------------------------------

- name: Find existing systemd-networkd files
  find:
    paths: /etc/systemd/network
    file_type: file
  register: existing_networkd_files

- name: Remove unmanaged networkd files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_networkd_files.files }}"
  when: (item.path | basename) not in (networkd_files | map(attribute='name') | list)
  loop_control:
    label: "{{ item.path | basename }}"
  register: removed_networkd_files

# ----------------------------------------------------------------------
# RELOAD NETWORKD ONCE IF ANYTHING CHANGED
# ----------------------------------------------------------------------

- name: Reload systemd-networkd if any changes occurred
  command: networkctl reload
  when: |
    written_networkd_files.changed
    or removed_networkd_files.changed

# ----------------------------------------------------------------------
# ENABLE systemd-networkd + resolved
# ----------------------------------------------------------------------

- name: Enable systemd-networkd
  systemd:
    name: systemd-networkd
    enabled: true

