# ----------------------------------------------------------------------
# SYSTEMD-NETWORKD FILE DEFINITIONS
# ----------------------------------------------------------------------

- name: Define desired systemd-networkd config files
  set_fact:
    networkd_files: >-
      {% if enable_vlans %}
      - name: "10-{{ lan_iface }}.network"
        content: |
          [Match]
          Name={{ lan_iface }}

          [Network]
          Bridge=br-lan
          {% for item in docker_networks | dict2items | selectattr('value.vlan_id') %}VLAN=vlan{{ item.value.vlan_id }}
          {% endfor %}
      - name: "20-br-lan.netdev"
        content: |
          [NetDev]
          Name=br-lan
          Kind=bridge

      - name: "20-br-lan.network"
        content: |
          [Match]
          Name=br-lan

          [Network]
          DHCP=yes
          IPv6AcceptRA=yes

          [Link]
          RequiredForOnline=routable
      {% else %}
      - name: "10-ethernet.network"
        content: |
          [Match]
          Name=en*

          [Network]
          DHCP=yes
          IPv6AcceptRA=yes
          RouteMetric=100

      - name: "20-wifi.network"
        content: |
          [Match]
          Name=wl*

          [Network]
          DHCP=yes
          IPv6AcceptRA=yes
          RouteMetric=200

      - name: "90-default.network"
        content: |
          [Match]
          Name=*

          [Network]
          DHCP=yes
          IPv6AcceptRA=yes
          RouteMetric=300
      {% endif %}

- name: Add VLAN networkd file definitions
  when: enable_vlans
  vars:
    vlan_files: |
      {% for item in docker_networks | dict2items | selectattr('value.vlan_id') %}
      - name: "30-vlan-{{ item.key }}.netdev"
        content: |
          [NetDev]
          Name=vlan{{ item.value.vlan_id }}
          Kind=vlan

          [VLAN]
          Id={{ item.value.vlan_id }}
      - name: "30-vlan-{{ item.key }}.network"
        content: |
          [Match]
          Name=vlan{{ item.value.vlan_id }}

          [Network]
          Bridge={{ item.value.parent }}
      - name: "40-{{ item.value.parent }}.netdev"
        content: |
          [NetDev]
          Name={{ item.value.parent }}
          Kind=bridge
      - name: "40-{{ item.value.parent }}.network"
        content: |
          [Match]
          Name={{ item.value.parent }}

          [Network]
          # No IP for host on bridge, only for containers.
          # This forces host to route all traffic to containers via the LAN gateway,
          # which is what we want, so that host is just another client on the LAN
      {% endfor %}
  set_fact:
    networkd_files: "{{ networkd_files + (vlan_files | from_yaml) }}"

# ----------------------------------------------------------------------
# DEPLOY THE FILES
# ----------------------------------------------------------------------

- name: Deploy systemd-networkd configuration files
  copy:
    dest: "/etc/systemd/network/{{ item.name }}"
    content: "{{ item.content }}"
    mode: "0644"
  loop: "{{ networkd_files }}"
  loop_control:
    label: "{{ item.name }}"
  register: written_networkd_files

# ----------------------------------------------------------------------
# REMOVE ANY OTHER NETWORKD FILES
# ----------------------------------------------------------------------

- name: Find existing systemd-networkd files
  find:
    paths: /etc/systemd/network
    file_type: file
  register: existing_networkd_files

- name: Remove unmanaged networkd files
  file:
    path: "{{ item.path }}"
    state: absent
  loop: "{{ existing_networkd_files.files }}"
  when: (item.path | basename) not in (networkd_files | map(attribute='name') | list)
  loop_control:
    label: "{{ item.path | basename }}"
  register: removed_networkd_files

# ----------------------------------------------------------------------
# RELOAD NETWORKD ONCE IF ANYTHING CHANGED
# ----------------------------------------------------------------------

- name: Reload systemd-networkd if any changes occurred
  command: networkctl reload
  when: |
    written_networkd_files.changed
    or removed_networkd_files.changed

# ----------------------------------------------------------------------
# ENABLE systemd-networkd + resolved
# ----------------------------------------------------------------------

- name: Enable systemd-networkd
  systemd:
    name: systemd-networkd
    enabled: true

