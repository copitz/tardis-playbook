---
# Install the `stacks` helper and a global bash completion
- name: Install stacks script
  copy:
    src: files/stacks.sh
    dest: /usr/local/bin/stacks
    owner: root
    group: root
    mode: '0755'

- name: Install global bash completion for stacks
  copy:
    src: files/stacks.bash_completion
    dest: /etc/bash_completion.d/stacks
    owner: root
    group: root
    mode: '0644'

- name: Link /opt/stacks to the host stacks directory when running locally
  file:
    src: "{{ playbook_dir }}/stacks/{{ inventory_hostname }}"
    dest: /opt/stacks
    state: link
    force: yes
  when: ansible_connection == 'local'

- name: Ensure /opt/stacks/.env exists with role-generated values before updating stacks
  copy:
    dest: /opt/stacks/.env
    content: |
      # Autogenerated by roles/stacks
      STACKS_DATA_DIR={{ stacks_data_dir }}
  register: stacks_env_copy

- name: Deploy changed stacks on remote hosts
  include_tasks: remote.yml
  vars:
    force_update_all: "{{ stacks_env_copy.changed | default(false) }}"
  when: ansible_connection != 'local'
